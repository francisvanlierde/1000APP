<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0d0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>1000 Millas — Copiloto</title>
<style>
  :root{
    --bg-panel:#14171a; --amber:#ff8a1e; --amber-dim:rgba(255,138,30,0.14);
    --muted:#8a929a; --line:#262b30;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;background:#000;font-family:-apple-system,"Segoe UI",Roboto,sans-serif;overflow:hidden;}
  #app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
  .screens{flex:1;position:relative;}
  .screens iframe{
    position:absolute; inset:0; width:100%; height:100%; border:none;
    display:none; background:#0b0d0f;
  }
  .screens iframe.active{display:block;}
  .tabbar{
    display:flex; background:var(--bg-panel); border-top:1px solid var(--line);
    padding-bottom:env(safe-area-inset-bottom);
  }
  .tab{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:9px 0 8px; cursor:pointer; color:var(--muted); background:none; border:none;
    font-family:inherit;
  }
  .tab.active{color:var(--amber);}
  .tab .ticon{font-size:19px;}
  .tab .tlabel{font-size:10px; font-weight:700; letter-spacing:.02em;}
</style>
</head>
<body>
<div id="app">
  <div class="screens" id="screens"></div>
  <div class="tabbar" id="tabbar"></div>
</div>

<script>
const tabs = [
  {id:"datos",   icon:"📋", label:"Datos",   src:"screens/datos.html"},
  {id:"carrera", icon:"⏱️", label:"Carrera", src:"screens/carrera.html"},
  {id:"score",   icon:"🏁", label:"Score",   src:"screens/score.html"},
  {id:"ajustes", icon:"⚙️", label:"Ajustes", src:"screens/ajustes.html"}
];
let active = "carrera";

const screensEl = document.getElementById("screens");
const tabbarEl = document.getElementById("tabbar");

tabs.forEach(t=>{
  const f = document.createElement("iframe");
  f.id = "frame-" + t.id;
  f.src = t.src;
  f.loading = "eager";
  screensEl.appendChild(f);
});

function render(){
  tabs.forEach(t=>{
    document.getElementById("frame-"+t.id).classList.toggle("active", t.id === active);
  });
  tabbarEl.innerHTML = "";
  tabs.forEach(t=>{
    const b = document.createElement("button");
    b.className = "tab" + (t.id === active ? " active" : "");
    b.innerHTML = '<span class="ticon">'+t.icon+'</span><span class="tlabel">'+t.label+'</span>';
    b.onclick = ()=>{ active = t.id; render(); };
    tabbarEl.appendChild(b);
  });
}
render();

if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
</body>
</html>
